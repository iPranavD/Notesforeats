<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Restaurants</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0a0a0a; -webkit-font-smoothing: antialiased; }
    input, select, textarea, button { font-family: 'DM Sans', sans-serif; }
    input::placeholder, textarea::placeholder { color: #3a3a3a; }
    select option { background: #181818; color: #d4cfc9; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    .press:active { transform: scale(0.96); }
    @keyframes slideUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    .slide-up { animation: slideUp 0.22s cubic-bezier(.22,1,.36,1); }
    .fade-in  { animation: fadeIn 0.18s ease; }
    .card:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FOOD_TYPES = [
      "Indian","Chinese","Italian","Mexican","Japanese","American",
      "Thai","Mediterranean","Korean","Middle Eastern","French",
      "Vietnamese","Greek","Pizza","Burgers","Seafood","Vegan","Fusion","Other"
    ];

    const PORTION_OPTIONS = [
      { value:1, label:"Tiny" },
      { value:2, label:"Small" },
      { value:3, label:"Medium" },
      { value:4, label:"Large" },
      { value:5, label:"Huge" },
    ];

    const CUISINE_COLORS = {
      Indian:"#fb923c", Chinese:"#f87171", Italian:"#4ade80", Mexican:"#facc15",
      Japanese:"#a78bfa", American:"#60a5fa", Thai:"#f472b6", Mediterranean:"#22d3ee",
      Korean:"#fb7185","Middle Eastern":"#fbbf24", French:"#c4b5fd", Vietnamese:"#34d399",
      Greek:"#38bdf8", Pizza:"#fdba74", Burgers:"#fcd34d", Seafood:"#67e8f9",
      Vegan:"#a3e635", Fusion:"#e879f9", Other:"#94a3b8"
    };

    const getColor = (t) => CUISINE_COLORS[t] || "#94a3b8";
    const STORAGE_KEY = "restaurants:v1";
    const loadItems = () => { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch { return []; } };
    const saveItems = (items) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch {} };

    const LBL = { fontSize:11, color:"#4a4a4a", letterSpacing:"0.07em", textTransform:"uppercase", marginBottom:6, display:"block" };

    function Modal({ onSave, onClose, initial }) {
      const [name,    setName]    = useState(initial?.name    || "");
      const [type,    setType]    = useState(initial?.type    || "");
      const [portion, setPortion] = useState(initial?.portion || 3);
      const [rating,  setRating]  = useState(initial?.rating  || 0);
      const [notes,   setNotes]   = useState(initial?.notes   || "");

      const ready = name.trim().length > 0;
      const submit = () => {
        if (!ready) return;
        onSave({ id: initial?.id || Date.now().toString(), addedAt: initial?.addedAt || new Date().toISOString(), name: name.trim(), type, portion, rating, notes: notes.trim() });
      };

      const field = { width:"100%", background:"#1c1c1c", border:"1px solid #272727", borderRadius:10, padding:"11px 13px", fontSize:15, color:"#d4cfc9", outline:"none" };

      return (
        <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200, backdropFilter:"blur(8px)" }}>
          <div onClick={e => e.stopPropagation()} className="slide-up" style={{ background:"#111", borderRadius:"22px 22px 0 0", padding:"22px 20px 44px", width:"100%", maxWidth:480, maxHeight:"93vh", overflowY:"auto", border:"1px solid #1e1e1e", borderBottom:"none" }}>
            <div style={{ width:32, height:4, background:"#272727", borderRadius:2, margin:"0 auto 22px" }} />
            <h2 style={{ fontFamily:"'Lora',serif", fontSize:"1.2rem", color:"#e8e3dd", marginBottom:22 }}>
              {initial ? "Edit Restaurant" : "New Restaurant"}
            </h2>
            <div style={{ display:"flex", flexDirection:"column", gap:15 }}>
              <div>
                <label style={LBL}>Name</label>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="Restaurant name" style={field} autoFocus />
              </div>
              <div>
                <label style={LBL}>Cuisine</label>
                <select value={type} onChange={e => setType(e.target.value)} style={{ ...field, cursor:"pointer", color: type ? "#d4cfc9" : "#3a3a3a" }}>
                  <option value="">Select…</option>
                  {FOOD_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label style={LBL}>Portion Size</label>
                <div style={{ display:"flex", gap:7 }}>
                  {PORTION_OPTIONS.map(p => (
                    <button key={p.value} onClick={() => setPortion(p.value)} className="press" style={{ flex:1, padding:"9px 0", borderRadius:9, border:"1.5px solid", borderColor: portion===p.value ? "#d4cfc9":"#252525", background: portion===p.value ? "#d4cfc9":"transparent", color: portion===p.value ? "#0a0a0a":"#4a4a4a", fontSize:12, fontWeight:500, cursor:"pointer", transition:"all 0.14s" }}>{p.label}</button>
                  ))}
                </div>
              </div>
              <div>
                <label style={LBL}>Rating</label>
                <div style={{ display:"flex", gap:3 }}>
                  {[1,2,3,4,5].map(r => (
                    <button key={r} onClick={() => setRating(r===rating ? 0 : r)} style={{ background:"none", border:"none", fontSize:"1.7rem", cursor:"pointer", padding:0, lineHeight:1, color:"#f59e0b", opacity: rating>=r ? 1 : 0.15, transition:"opacity 0.12s" }}>★</button>
                  ))}
                </div>
              </div>
              <div>
                <label style={LBL}>Notes</label>
                <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Best dish, vibe, worth returning?" rows={3} style={{ ...field, resize:"none", lineHeight:1.6 }} />
              </div>
              <button onClick={submit} disabled={!ready} className="press" style={{ marginTop:4, padding:"14px 0", borderRadius:12, border:"none", background: ready ? "#d4cfc9":"#1e1e1e", color: ready ? "#0a0a0a":"#333", fontSize:15, fontWeight:600, cursor: ready ? "pointer":"default", transition:"all 0.18s" }}>Save</button>
            </div>
          </div>
        </div>
      );
    }

    function Card({ r, onEdit, onDelete }) {
      const [open, setOpen] = useState(false);
      const accent = getColor(r.type);
      const portionLabel = PORTION_OPTIONS.find(p => p.value===r.portion)?.label || "";

      return (
        <div className="card" style={{ background:"#111", borderRadius:15, border:"1px solid #1c1c1c", overflow:"hidden" }}>
          <div onClick={() => setOpen(o => !o)} style={{ padding:"15px 16px", display:"flex", alignItems:"flex-start", gap:12, cursor:"pointer" }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:accent, marginTop:6, flexShrink:0, boxShadow:`0 0 0 3px ${accent}25` }} />
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
                <p style={{ fontFamily:"'Lora',serif", fontWeight:600, fontSize:"1rem", color:"#d4cfc9", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{r.name}</p>
                <span style={{ color:"#333", fontSize:11, flexShrink:0 }}>{open ? "▴" : "▾"}</span>
              </div>
              <div style={{ display:"flex", gap:7, marginTop:6, alignItems:"center", flexWrap:"wrap" }}>
                {r.type && <span style={{ fontSize:11, fontWeight:500, color:accent, background:`${accent}18`, borderRadius:6, padding:"2px 8px" }}>{r.type}</span>}
                {portionLabel && <span style={{ fontSize:12, color:"#4a4a4a" }}>{portionLabel}</span>}
                {r.rating > 0 && <span style={{ fontSize:11, color:"#f59e0b" }}>{"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}</span>}
              </div>
            </div>
          </div>
          {open && (
            <div className="fade-in" style={{ padding:"0 16px 15px 36px", borderTop:"1px solid #181818" }}>
              {r.notes && <p style={{ fontSize:13.5, color:"#5a5a5a", lineHeight:1.65, marginTop:10, marginBottom:12 }}>{r.notes}</p>}
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => onEdit(r)} className="press" style={{ background:"#1c1c1c", border:"none", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:500, color:"#7a7a7a", cursor:"pointer" }}>Edit</button>
                <button onClick={() => onDelete(r.id)} className="press" style={{ background:"none", border:"1px solid #3a1a1a", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:500, color:"#f87171", cursor:"pointer" }}>Delete</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [items,  setItems]  = useState(loadItems);
      const [modal,  setModal]  = useState(null);
      const [search, setSearch] = useState("");
      const [filter, setFilter] = useState("");
      const [sort,   setSort]   = useState("newest");

      const persist = (next) => { setItems(next); saveItems(next); };
      const handleSave = (restaurant) => {
        persist(modal?.id ? items.map(i => i.id===restaurant.id ? restaurant : i) : [restaurant, ...items]);
        setModal(null);
      };

      const uniqueTypes = [...new Set(items.map(i => i.type).filter(Boolean))].sort();
      const filtered = items
        .filter(r => {
          const q = search.toLowerCase();
          return (!q || r.name.toLowerCase().includes(q) || (r.type||"").toLowerCase().includes(q)) && (!filter || r.type===filter);
        })
        .sort((a,b) => {
          if (sort==="newest")  return new Date(b.addedAt) - new Date(a.addedAt);
          if (sort==="rating")  return b.rating - a.rating;
          if (sort==="portion") return b.portion - a.portion;
          return a.name.localeCompare(b.name);
        });

      const chip = (active) => ({ background: active ? "#d4cfc9":"#161616", color: active ? "#0a0a0a":"#4a4a4a", border:`1px solid ${active ? "#d4cfc9":"#1e1e1e"}`, borderRadius:10, padding:"7px 13px", fontSize:12, fontWeight:500, cursor:"pointer", flexShrink:0, transition:"all 0.15s" });

      return (
        <div style={{ minHeight:"100vh", background:"#0a0a0a", fontFamily:"'DM Sans',sans-serif", maxWidth:480, margin:"0 auto" }}>

          <div style={{ background:"#0a0a0a", padding:"52px 20px 14px", position:"sticky", top:0, zIndex:100, borderBottom:"1px solid #141414" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:16 }}>
              <div>
                <p style={{ fontSize:11, color:"#333", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4 }}>Your Guide</p>
                <h1 style={{ fontFamily:"'Lora',serif", fontSize:"1.8rem", fontWeight:700, color:"#d4cfc9", lineHeight:1 }}>Restaurants</h1>
              </div>
              <div style={{ textAlign:"right" }}>
                <p style={{ fontSize:"1.6rem", fontWeight:700, color:"#d4cfc9", lineHeight:1 }}>{items.length}</p>
                <p style={{ fontSize:11, color:"#333", marginTop:2 }}>saved</p>
              </div>
            </div>
            <div style={{ position:"relative", marginBottom:10 }}>
              <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#333", fontSize:13 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…" style={{ width:"100%", background:"#141414", border:"1px solid #1e1e1e", borderRadius:12, padding:"10px 13px 10px 34px", fontSize:14, color:"#d4cfc9", outline:"none" }} />
            </div>
            <div style={{ display:"flex", gap:7, overflowX:"auto", paddingBottom:2 }}>
              <select value={filter} onChange={e => setFilter(e.target.value)} style={{ ...chip(!!filter), outline:"none", cursor:"pointer" }}>
                <option value="">All cuisines</option>
                {uniqueTypes.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              {[{key:"newest",label:"Latest"},{key:"rating",label:"Top rated"},{key:"portion",label:"Biggest"},{key:"name",label:"A–Z"}].map(s => (
                <button key={s.key} onClick={() => setSort(s.key)} className="press" style={chip(sort===s.key)}>{s.label}</button>
              ))}
            </div>
          </div>

          <div style={{ padding:"14px 18px 110px" }}>
            {filtered.length===0 ? (
              <div style={{ textAlign:"center", marginTop:72 }}>
                <p style={{ fontSize:"2.5rem", marginBottom:12 }}>🍽️</p>
                <p style={{ color:"#2a2a2a", fontSize:14 }}>{items.length===0 ? "Tap + to add your first restaurant" : "No results found"}</p>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                {filtered.map(r => <Card key={r.id} r={r} onEdit={r => setModal(r)} onDelete={id => persist(items.filter(i => i.id!==id))} />)}
              </div>
            )}
          </div>

          <button onClick={() => setModal("add")} className="press" style={{ position:"fixed", bottom:30, right:22, width:54, height:54, borderRadius:"50%", background:"#d4cfc9", color:"#0a0a0a", border:"none", fontSize:"1.5rem", cursor:"pointer", boxShadow:"0 6px 28px rgba(0,0,0,0.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:150 }}>+</button>

          {modal && <Modal onSave={handleSave} onClose={() => setModal(null)} initial={modal==="add" ? null : modal} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
